<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神秘塔羅占卜</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(10, 18, 34, 0.84);
      --line: rgba(255, 218, 138, 0.2);
      --gold: #f3c56b;
      --gold-strong: #ffd98f;
      --violet: #8e79ff;
      --mint: #8fe7d4;
      --text: #f8f4ed;
      --muted: #b4bfd5;
      --danger: #ff8f8f;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", Georgia, serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(142, 121, 255, 0.22), transparent 30%),
        radial-gradient(circle at 20% 20%, rgba(143, 231, 212, 0.15), transparent 25%),
        linear-gradient(160deg, #07111f 0%, #0c1730 45%, #050811 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle at 15% 25%, rgba(255, 255, 255, 0.9) 0 1px, transparent 1.2px),
        radial-gradient(circle at 74% 18%, rgba(255, 255, 255, 0.75) 0 1px, transparent 1.1px),
        radial-gradient(circle at 33% 68%, rgba(255, 255, 255, 0.6) 0 1px, transparent 1.1px),
        radial-gradient(circle at 82% 62%, rgba(255, 255, 255, 0.8) 0 1px, transparent 1.2px);
      background-size: 220px 220px;
      opacity: 0.45;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .hero {
      text-align: center;
      padding: 36px 24px 22px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 0.18em;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(42px, 7vw, 88px);
      line-height: 0.95;
      letter-spacing: 0.08em;
      color: transparent;
      background: linear-gradient(180deg, #fffdf6 0%, #f6dba4 46%, #c18b37 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .subtitle {
      margin: 0 auto;
      width: min(720px, 100%);
      color: var(--muted);
      font-size: 16px;
      line-height: 1.9;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: var(--shadow);
      border-radius: 28px;
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .panel-inner, .ritual { padding: 26px; }
    .panel-title { margin: 0 0 8px; font-size: 22px; color: var(--gold-strong); }
    .panel-copy, .footer-note { margin: 0 0 22px; color: var(--muted); line-height: 1.8; font-size: 14px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; margin-bottom: 10px; font-size: 13px; color: var(--gold); letter-spacing: 0.08em; }

    select, textarea, button { font: inherit; }
    select, textarea {
      width: 100%; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(4, 10, 22, 0.82); color: var(--text); padding: 16px 18px; outline: none;
    }
    textarea { min-height: 160px; resize: vertical; line-height: 1.8; }

    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .chip {
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: var(--muted);
      border-radius: 999px; padding: 8px 12px; cursor: pointer;
    }
    .chip:hover, .chip.active { color: var(--text); border-color: rgba(243,197,107,0.45); background: rgba(243,197,107,0.12); }

    .question-list { display: grid; gap: 10px; max-height: 320px; overflow: auto; padding-right: 4px; }
    .question-item {
      width: 100%; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); color: var(--text);
      padding: 14px 16px; border-radius: 16px; text-align: left; cursor: pointer;
    }

    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
    .button { border: 0; border-radius: 999px; padding: 14px 20px; cursor: pointer; }
    .button-primary {
      color: #1a1204; font-weight: 700;
      background: linear-gradient(135deg, #ffd98f 0%, #f3c56b 55%, #cf8d39 100%);
      box-shadow: 0 12px 24px rgba(207, 141, 57, 0.24);
    }
    .button-secondary { color: var(--text); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }

    .spread-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 18px; }
    .meta-card, .reading-box {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 18px; padding: 14px 18px;
    }
    .meta-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.06em; }
    .meta-value { font-size: 15px; color: var(--gold-strong); }

    .ritual {
      position: relative; min-height: 100%; display: flex; flex-direction: column; gap: 20px;
    }
    .ritual::before {
      content: ""; position: absolute; inset: 18px; border: 1px solid rgba(243,197,107,0.12); border-radius: 24px; pointer-events: none;
    }

    .status {
      display: inline-flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 999px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--muted); font-size: 13px; align-self: flex-start;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 14px rgba(143,231,212,0.7); }

    .deck { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 18px; }
    .card {
      position: relative; min-height: 236px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.08); overflow: hidden;
      background: radial-gradient(circle at top, rgba(255,217,143,0.18), transparent 42%), linear-gradient(180deg, rgba(13,22,41,0.98), rgba(6,10,20,0.98));
    }
    .card-frame { position: absolute; inset: 10px; border: 1px solid rgba(243,197,107,0.18); border-radius: 16px; }
    .card-placeholder, .card-face {
      position: absolute; inset: 0; padding: 18px; display: flex; flex-direction: column; justify-content: space-between;
    }
    .card-placeholder { align-items: center; justify-content: center; text-align: center; color: var(--muted); gap: 14px; }
    .sigil {
      width: 72px; height: 72px; border-radius: 50%; border: 1px solid rgba(243,197,107,0.28); display: grid; place-items: center;
      color: var(--gold); font-size: 28px; background: rgba(255,255,255,0.03);
    }
    .position-tag, .orientation-tag {
      display: inline-flex; padding: 6px 10px; border-radius: 999px; font-size: 11px; letter-spacing: 0.08em; align-self: flex-start;
    }
    .position-tag { background: rgba(142,121,255,0.16); color: #d9d0ff; }
    .orientation-tag { background: rgba(255,143,143,0.12); color: #ffb8b8; border: 1px solid rgba(255,143,143,0.2); }
    .card-name-zh { font-size: 24px; color: var(--gold-strong); margin: 0; }
    .card-name-en { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .card-meaning { margin-top: 12px; color: #dbe5f5; line-height: 1.8; font-size: 14px; }
    .reading { display: grid; gap: 16px; }
    .reading-box h3 { margin: 0 0 10px; color: var(--gold-strong); font-size: 18px; }
    .reading-box p, .reading-box li { color: #dde5f3; line-height: 1.9; margin: 0; }
    .reading-box ul { margin: 0; padding-left: 20px; }
    .error { color: var(--danger); min-height: 24px; margin-top: 10px; font-size: 14px; }

    @media (max-width: 940px) { .grid { grid-template-columns: 1fr; } }
    @media (max-width: 640px) {
      .shell { width: min(100% - 20px, 1160px); padding-top: 16px; }
      .hero { padding-inline: 6px; }
      .panel-inner, .ritual { padding: 18px; }
      .deck { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="eyebrow">神秘塔羅占卜</div>
      <h1>神秘塔羅</h1>
      <p class="subtitle">整理過、可直接部署的塔羅占卜頁面。輸入問題、選擇牌陣、抽出卡牌，取得一份清楚好讀的占卜整理，而且不需要外部 API 或外露金鑰。</p>
    </section>

    <section class="grid">
      <article class="panel">
        <div class="panel-inner">
          <h2 class="panel-title">開始占卜</h2>
          <p class="panel-copy">這個版本已移除重複套件與前端外露金鑰，現在是一個可直接放上 GitHub Pages 的靜態網站。</p>

          <div class="field">
            <label for="spread">牌陣</label>
            <select id="spread"></select>
          </div>

          <div class="field">
            <label for="question">你的問題</label>
            <textarea id="question" placeholder="例如：我接下來三個月最該專注的是什麼？"></textarea>
          </div>

          <div class="field">
            <label>靈感提問</label>
            <div class="chips" id="categoryChips"></div>
            <div class="question-list" id="questionList"></div>
          </div>

          <div class="spread-meta">
            <div class="meta-card"><div class="meta-label">抽牌張數</div><div class="meta-value" id="metaCount">1 張</div></div>
            <div class="meta-card"><div class="meta-label">位置</div><div class="meta-value" id="metaPositions">核心訊息</div></div>
          </div>

          <div class="actions">
            <button class="button button-primary" id="drawButton">抽牌解讀</button>
            <button class="button button-secondary" id="resetButton">重設</button>
          </div>
          <div class="error" id="errorMessage"></div>
        </div>
      </article>

      <aside class="panel">
        <div class="ritual">
          <div class="status"><span class="status-dot"></span><span id="statusText">等待你提出問題</span></div>
          <div class="deck" id="deck"></div>
          <div class="reading" id="reading"></div>
          <p class="footer-note">這份解讀提供的是反思與方向，不代替專業醫療、法律或財務建議。</p>
        </div>
      </aside>
    </section>
  </div>

  <script>
    const spreads = [
      { id: 'single', name: '單張指引', count: 1, positions: ['核心訊息'], description: '適合快速確認目前最重要的提醒。' },
      { id: 'timeline', name: '過去／現在／近期未來', count: 3, positions: ['過去脈絡', '當下狀態', '近期未來'], description: '適合用時間軸理解事情如何走到現在。' },
      { id: 'choice', name: '兩難抉擇', count: 3, positions: ['選項 A', '選項 B', '整體建議'], description: '適合在兩個方向之間做判斷。' }
    ];

    const promptGroups = [
      { category: '感情', questions: ['這段關係現在真正的核心是什麼？', '我該繼續等待，還是把重心拉回自己身上？', '這段關係接下來幾個月可能怎麼發展？'] },
      { category: '工作', questions: ['我在工作上卡住的真正原因是什麼？', '我該留在現在的環境，還是開始準備轉換？', '如果我想提升收入，最聰明的第一步是什麼？'] },
      { category: '自我', questions: ['我現在最需要放下的內在模式是什麼？', '在焦慮底下，我真正害怕的是什麼？', '我該如何重新建立更健康的節奏與界線？'] }
    ];

    const majorArcana = [
      ['the-fool', '愚者', 'The Fool', '新的開始', '勇敢走向未知，新的可能性正在打開。', '衝動或過度樂觀，可能讓你忽略必要的準備。'],
      ['the-magician', '魔術師', 'The Magician', '主動創造', '你手上其實已有資源，關鍵在於立即行動。', '能量分散、說得多做得少，需要把注意力收回。'],
      ['the-high-priestess', '女祭司', 'The High Priestess', '直覺', '放慢速度，傾聽內在真正知道的答案。', '過度觀望或把情緒藏太深，反而讓真相更模糊。'],
      ['the-empress', '皇后', 'The Empress', '滋養', '關係、創意與照顧能量正在成長。', '過度付出或沉溺舒適，會讓自己失去平衡。'],
      ['the-emperor', '皇帝', 'The Emperor', '秩序', '建立界線與規則，事情會更穩。', '控制慾過強，會讓關係和局勢變得僵硬。'],
      ['the-hierophant', '教皇', 'The Hierophant', '信念與方法', '找回可信的做法、制度或前輩指引。', '舊規則可能已不再適合現在的你。'],
      ['the-lovers', '戀人', 'The Lovers', '選擇', '真正的答案來自價值是否一致。', '猶豫與分裂感，讓簡單選擇也變困難。'],
      ['the-chariot', '戰車', 'The Chariot', '推進', '只要把力量對準方向，就能往前。', '用力過猛，反而掩蓋了內在衝突。'],
      ['strength', '力量', 'Strength', '溫柔的堅定', '真正的力量來自穩定與節制。', '壓抑太久的情緒，可能在不對的時候爆開。'],
      ['the-hermit', '隱者', 'The Hermit', '沉澱', '拉開距離後，你會看得更清楚。', '過度封閉，容易把思考變成停滯。'],
      ['wheel-of-fortune', '命運之輪', 'Wheel of Fortune', '轉變', '局勢正在移動，順勢調整比硬撐更有用。', '抗拒變化，只會增加不必要的摩擦。'],
      ['justice', '正義', 'Justice', '平衡與誠實', '誠實面對因果與責任，答案會更清楚。', '逃避代價，只會延後真正的解決。'],
      ['the-hanged-man', '吊人', 'The Hanged Man', '換個角度', '暫停不一定是失敗，也可能是在換視角。', '沒有方向的拖延，會把等待變成困住。'],
      ['death', '死神', 'Death', '結束與重生', '讓舊的階段結束，新的空間才會打開。', '不肯放手，會讓轉變變得更辛苦。'],
      ['temperance', '節制', 'Temperance', '調和', '把節奏調回平衡，局勢會重新流動。', '過量、極端與失衡，正在消耗你的能量。'],
      ['the-devil', '惡魔', 'The Devil', '執著與束縛', '先看見自己被什麼綁住，才能真正鬆開。', '恐懼、依附或慾望正在放大問題。'],
      ['the-tower', '高塔', 'The Tower', '破除幻象', '突然的變化是在逼你回到真相。', '拖越久，舊結構崩掉時的衝擊越大。'],
      ['the-star', '星星', 'The Star', '希望', '修復與清明正在慢慢回來。', '失望感可能比現實本身更重。'],
      ['the-moon', '月亮', 'The Moon', '模糊與潛意識', '現在不是所有事都看得清，先保持覺察。', '焦慮與投射可能扭曲了事實。'],
      ['the-sun', '太陽', 'The Sun', '明朗', '真相、溫暖與信心正逐漸靠近。', '只看樂觀面，可能會忽略細節。'],
      ['judgement', '審判', 'Judgement', '召喚', '你正被要求回應更深層的內在召喚。', '自責與反覆後悔，會讓你聽不見真正的訊息。'],
      ['the-world', '世界', 'The World', '完成', '一個循環即將完整收束，準備進入下一章。', '尾聲沒收好，新的開始就難以展開。']
    ];

    const suitProfiles = {
      Wands: { zh: '權杖', theme: '行動與熱情', upright: '提醒你主動推進，把想法化為行動。', reversed: '拖延、躁進或疲乏，可能正在削弱你的火力。' },
      Cups: { zh: '聖杯', theme: '情感與關係', upright: '情緒、連結與內心需求是關鍵。', reversed: '情緒積壓或混亂，正在遮住問題核心。' },
      Swords: { zh: '寶劍', theme: '思考與決斷', upright: '把事實說清楚，判斷才會穩。', reversed: '過度思考，可能比現實本身更吵雜。' },
      Pentacles: { zh: '錢幣', theme: '現實與穩定', upright: '把注意力放回資源、身體與長期穩定。', reversed: '對安全感的壓力，正在打亂你的專注。' }
    };

    const ranks = [
      ['Ace', '一', '新的開端正在出現。', '機會已經出現，但還需要你真正接住。'],
      ['Two', '二', '重點在平衡、協調與選擇。', '猶豫太久，會讓能量停住。'],
      ['Three', '三', '合作、支持或初步成果開始浮現。', '與他人的落差，可能拖慢進展。'],
      ['Four', '四', '穩定與休整同樣重要。', '抓得太緊，會讓流動變少。'],
      ['Five', '五', '衝突會讓真正的缺口被看見。', '挫折雖然明顯，但它不是全貌。'],
      ['Six', '六', '修復、過渡或彼此支持是可能的。', '表面平靜下，可能還有未完成的事。'],
      ['Seven', '七', '現在特別需要策略與辨識力。', '注意力分散，會削弱你的判斷。'],
      ['Eight', '八', '專注投入後，進展會加快。', '卡住的不一定是能力，而可能是方向。'],
      ['Nine', '九', '你已經靠近結果，但壓力也很明顯。', '忽略疲憊，容易讓觀點失真。'],
      ['Ten', '十', '一個循環正走向高峰或收尾。', '負擔可能已經超過合理範圍。'],
      ['Page', '侍者', '新的訊息、態度或學習入口正在出現。', '不夠成熟或三分鐘熱度，可能是關鍵。'],
      ['Knight', '騎士', '推進、追求與行動正在主導局勢。', '太快或反覆不定，會造成消耗。'],
      ['Queen', '皇后', '成熟、細膩與內在掌握感會幫到你。', '情緒與照顧分寸失衡，需要重新校準。'],
      ['King', '國王', '現在需要穩住大局並做出成熟決定。', '控制與僵化，可能壓過了真正需求。']
    ];

    const deck = buildDeck();
    const spreadSelect = document.getElementById('spread');
    const questionInput = document.getElementById('question');
    const categoryChips = document.getElementById('categoryChips');
    const questionList = document.getElementById('questionList');
    const metaCount = document.getElementById('metaCount');
    const metaPositions = document.getElementById('metaPositions');
    const drawButton = document.getElementById('drawButton');
    const resetButton = document.getElementById('resetButton');
    const deckElement = document.getElementById('deck');
    const readingElement = document.getElementById('reading');
    const statusText = document.getElementById('statusText');
    const errorMessage = document.getElementById('errorMessage');
    let activeCategory = promptGroups[0].category;

    renderSpreadOptions();
    renderPromptGroups();
    updateSpreadMeta();
    renderEmptyState();
    spreadSelect.addEventListener('change', updateSpreadMeta);
    drawButton.addEventListener('click', handleReading);
    resetButton.addEventListener('click', resetAll);

    function buildDeck() {
      const majors = majorArcana.map(([id, nameZh, nameEn, keywords, upright, reversed], index) => ({ id, nameZh, nameEn, arcana: 'Major', keywords, uprightBase: upright, reversedBase: reversed, order: index }));
      const minors = [];
      Object.entries(suitProfiles).forEach(([suitKey, suit]) => {
        ranks.forEach(([rankEn, rankZh, upright, reversed], index) => {
          minors.push({
            id: `${suitKey.toLowerCase()}-${rankEn.toLowerCase()}`,
            nameZh: `${suit.zh}${rankZh}`,
            nameEn: `${rankEn} of ${suitKey}`,
            arcana: 'Minor',
            keywords: suit.theme,
            uprightBase: `${upright} ${suit.upright}`,
            reversedBase: `${reversed} ${suit.reversed}`,
            order: index + 1
          });
        });
      });
      return [...majors, ...minors];
    }

    function renderSpreadOptions() {
      spreadSelect.innerHTML = spreads.map((spread) => `<option value="${spread.id}">${spread.name}</option>`).join('');
    }

    function renderPromptGroups() {
      categoryChips.innerHTML = promptGroups.map((group) => `<button class="chip ${group.category === activeCategory ? 'active' : ''}" data-category="${group.category}">${group.category}</button>`).join('');
      Array.from(categoryChips.querySelectorAll('.chip')).forEach((button) => {
        button.addEventListener('click', () => { activeCategory = button.dataset.category; renderPromptGroups(); });
      });
      const active = promptGroups.find((group) => group.category === activeCategory);
      questionList.innerHTML = active.questions.map((question) => `<button class="question-item" type="button">${question}</button>`).join('');
      Array.from(questionList.querySelectorAll('.question-item')).forEach((button) => {
        button.addEventListener('click', () => { questionInput.value = button.textContent.trim(); });
      });
    }

    function getCurrentSpread() { return spreads.find((spread) => spread.id === spreadSelect.value) || spreads[0]; }

    function updateSpreadMeta() {
      const spread = getCurrentSpread();
      metaCount.textContent = `${spread.count} 張`;
      metaPositions.textContent = spread.positions.join(' / ');
    }

    function renderEmptyState() {
      deckElement.innerHTML = '<article class="card"><div class="card-frame"></div><div class="card-placeholder"><div class="sigil">✦</div><strong>尚未抽牌</strong><span>選好牌陣、輸入問題後，就可以開始占卜。</span></div></article>';
      readingElement.innerHTML = '';
    }

    function handleReading() {
      const question = questionInput.value.trim();
      if (!question) {
        errorMessage.textContent = '請先輸入你的問題。';
        return;
      }
      errorMessage.textContent = '';
      const spread = getCurrentSpread();
      const cards = drawCards(spread);
      statusText.textContent = `占卜進行中：已翻開 ${spread.count} 張牌`;
      renderCards(cards);
      renderReading(question, spread, cards);
    }

    function drawCards(spread) {
      const pool = [...deck];
      shuffle(pool);
      return spread.positions.map((position, index) => ({ ...pool[index], position, reversed: Math.random() < 0.35, positionMeaning: getPositionMeaning(spread.id, position) }));
    }

    function shuffle(list) {
      for (let i = list.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }

    function getPositionMeaning(spreadId, position) {
      const meanings = {
        single: { '核心訊息': '這是本次占卜最核心的訊息。' },
        timeline: {
          '過去脈絡': '顯示事情如何發展到現在。',
          '當下狀態': '指出此刻最重要的狀態。',
          '近期未來': '顯示若照目前節奏走下去，接下來可能的發展。'
        },
        choice: {
          '選項 A': '呈現第一個方向的氣氛、代價與成長性。',
          '選項 B': '呈現第二個方向的氣氛、代價與成長性。',
          '整體建議': '這不是替你做決定，而是提醒你該怎麼選。'
        }
      };
      return meanings[spreadId][position];
    }

    function renderCards(cards) {
      deckElement.innerHTML = cards.map((card) => `
        <article class="card">
          <div class="card-frame"></div>
          <div class="card-face">
            <div>
              <div class="position-tag">${card.position}</div>
              ${card.reversed ? '<div class="orientation-tag" style="margin-top:10px;">逆位</div>' : ''}
            </div>
            <div>
              <h3 class="card-name-zh">${card.nameZh}</h3>
              <p class="card-name-en">${card.nameEn}</p>
              <p class="card-meaning">${card.reversed ? card.reversedBase : card.uprightBase}</p>
            </div>
          </div>
        </article>
      `).join('');
    }

    function renderReading(question, spread, cards) {
      const summary = buildSummary(cards);
      const action = buildAction(cards);
      const caution = buildCaution(cards);
      readingElement.innerHTML = `
        <section class="reading-box"><h3>你的問題</h3><p>${escapeHtml(question)}</p></section>
        <section class="reading-box"><h3>牌陣焦點</h3><p>${spread.description}</p><ul>${cards.map((card) => `<li><strong>${card.position}</strong>：${card.positionMeaning}</li>`).join('')}</ul></section>
        <section class="reading-box"><h3>整體解讀</h3><p>${summary}</p></section>
        <section class="reading-box"><h3>下一步建議</h3><p>${action}</p></section>
        <section class="reading-box"><h3>需要留意</h3><p>${caution}</p></section>
      `;
    }

    function buildSummary(cards) {
      const majorCount = cards.filter((card) => card.arcana === 'Major').length;
      const reversedCount = cards.filter((card) => card.reversed).length;
      const lead = cards[0];
      const intro = `${lead.nameZh} 作為起點，指出你現在最需要正視的主題是「${lead.keywords}」。這件事更需要清醒地看待，而不是靠習慣反應。`;
      let weight = '';
      if (majorCount >= 2) weight = '這組牌裡的大牌偏多，代表這不只是眼前的小波動，而是帶有明顯的人生課題。';
      else if (majorCount === 1) weight = '其中有一張大牌，表示這件事裡藏著一個關鍵轉折點。';
      else weight = '這組牌比較偏向日常層面的狀態，重點在於你如何處理眼前節奏。';
      let flow = '';
      if (reversedCount >= 2) flow = '逆位偏多，代表真正卡住你的，往往是內在阻力、拖延或情緒累積，而不完全是外在條件。';
      else if (reversedCount === 1) flow = '有一張逆位提醒你，問題的摩擦點可能更接近心態與時機，而不是表面局勢。';
      else flow = '整體正位較多，表示只要你對準核心，事情其實有往前的空間。';
      const positions = cards.map((card) => `${card.position} 出現 ${card.nameZh}：${card.reversed ? card.reversedBase : card.uprightBase}`).join(' ');
      return `${intro} ${weight} ${flow} ${positions}`;
    }

    function buildAction(cards) {
      const card = cards.find((item) => !item.reversed) || cards[0];
      return `先從「${card.position}」這一塊開始最有效。${card.nameZh} 給你的方向是：${card.uprightBase} 把這個提醒變成一個看得見的動作，例如說清需求、設下時限、整理資源，或停止一個一直消耗你的慣性。`;
    }

    function buildCaution(cards) {
      const reversedCard = cards.find((card) => card.reversed);
      if (reversedCard) {
        return `${reversedCard.nameZh} 的逆位是這次最需要留意的訊號：${reversedCard.reversedBase} 如果你只是一直在腦中反覆打轉，卻沒有回到現實確認狀況，焦慮會比問題本身長得更快。`;
      }
      return '整體走向不差，但也不要因為方向看起來順，就提早鬆手。真正穩定的結果，仍然需要節奏、誠實與好好收尾。';
    }

    function resetAll() {
      questionInput.value = '';
      errorMessage.textContent = '';
      statusText.textContent = '等待你提出問題';
      renderEmptyState();
    }

    function escapeHtml(value) {
      return value.replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }
  </script>
</body>
</html>
